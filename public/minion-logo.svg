<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Goggles metallic gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0" />
      <stop offset="50%" stop-color="#b0b0b0" />
      <stop offset="100%" stop-color="#707070" />
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5a2b" />
      <stop offset="70%" stop-color="#5d4037" />
      <stop offset="100%" stop-color="#3e2723" />
    </radialGradient>
  </defs>

  <!-- Minion Yellow Background -->
  <rect width="512" height="512" rx="128" fill="#f9d835" />

  <!-- Goggle Strap -->
  <rect x="0" y="216" width="512" height="80" fill="#1a1a1a" rx="10" />
  <rect x="0" y="226" width="512" height="5" fill="#2d2d2d" />
  <rect x="0" y="281" width="512" height="5" fill="#111111" />

  <!-- Goggle Gasket/Frame Back Shadow -->
  <circle cx="256" cy="256" r="142" fill="#000000" opacity="0.3" />

  <!-- Chrome Goggles Ring -->
  <circle cx="256" cy="256" r="130" fill="url(#chrome)" stroke="#3a3a3a" stroke-width="6" />
  <circle cx="256" cy="256" r="102" fill="#1a1a1a" />

  <!-- Eyeball -->
  <circle cx="256" cy="256" r="96" fill="#fbfbfd" />
  <!-- Inner Eyeball shadow -->
  <path d="M 160 256 A 96 96 0 0 1 352 256 Z" fill="#000" opacity="0.05" />

  <!-- Iris (Brown) -->
  <circle cx="256" cy="256" r="32" fill="url(#iris)" stroke="#3e2723" stroke-width="2" />

  <!-- Pupil -->
  <circle cx="256" cy="256" r="18" fill="#111111" />

  <!-- Reflections -->
  <circle cx="248" cy="248" r="6" fill="#ffffff" />
  <circle cx="262" cy="262" r="3" fill="#ffffff" opacity="0.8" />
</svg>
