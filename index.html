<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Minionese Deterministic Translator</title>
    <style>
      :root {
        --banana-yellow: #ffe135;
        --overalls-blue: #0052cc;
        --overalls-hover: #0043a4;
        --dark-bg: #0f0f11;
        --card-bg: #16161a;
        --input-bg: #222227;
        --text-light: #f4f4f6;
        --text-dim: #9a9a87;
        --border-color: #2d2d34;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--dark-bg);
        color: var(--text-light);
        padding: 16px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .container {
        width: 100%;
        max-width: 600px;
        background-color: var(--card-bg);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        border: 1px solid var(--border-color);
        margin-top: 8px;
      }

      h1 {
        text-align: center;
        color: var(--banana-yellow);
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 20px;
        text-transform: uppercase;
      }

      .toggle-container {
        display: flex;
        background-color: var(--input-bg);
        padding: 4px;
        border-radius: 14px;
        margin-bottom: 20px;
        border: 1px solid var(--border-color);
      }

      .toggle-btn {
        flex: 1;
        background: none;
        border: none;
        color: var(--text-dim);
        padding: 14px 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 11px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .toggle-btn.active {
        background-color: var(--overalls-blue);
        color: white;
      }

      .input-group {
        margin-bottom: 20px;
        position: relative;
      }

      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        padding: 0 4px;
      }

      label {
        color: var(--text-dim);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      textarea {
        width: 100%;
        min-height: 110px;
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        padding: 16px;
        color: var(--text-light);
        font-size: 1.1rem;
        line-height: 1.5;
        resize: none;
        outline: none;
        transition: border-color 0.15s ease;
        font-display: swap;
      }

      textarea:focus {
        border-color: var(--banana-yellow);
      }

      textarea[readonly] {
        background-color: rgba(22, 22, 26, 0.5);
      }

      .action-btn {
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        color: var(--text-light);
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.15s ease;
      }

      .action-btn:active {
        transform: scale(0.97);
        background-color: var(--border-color);
      }

      .dictionary-drawer {
        margin-top: 10px;
        border-top: 1px solid var(--border-color);
        padding-top: 15px;
      }

      .drawer-toggle {
        width: 100%;
        background: none;
        border: none;
        color: var(--banana-yellow);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        padding: 10px 0;
        text-align: center;
      }

      .drawer-content {
        display: none;
        max-height: 220px;
        overflow-y: auto;
        margin-top: 10px;
        padding-right: 4px;
      }

      .drawer-content.open {
        display: block;
      }

      .dict-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        font-size: 0.85rem;
      }

      .dict-item {
        background: var(--input-bg);
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
      }

      .dict-item span:first-child {
        color: var(--text-dim);
      }

      .dict-item span:last-child {
        color: var(--banana-yellow);
        font-weight: 600;
      }

      /* Custom Scrollbar for Mobile Drawers */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--dark-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Bello</h1>

      <div class="toggle-container">
        <button
          id="toMinionBtn"
          class="toggle-btn active"
          onclick="setDirection('toMinion')"
        >
          English → Minion
        </button>
        <button
          id="toEnglishBtn"
          class="toggle-btn"
          onclick="setDirection('toEnglish')"
        >
          Minion → English
        </button>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label id="inputLabel" for="sourceText">English</label>
          <button class="action-btn" onclick="clearInput()">Clear</button>
        </div>
        <textarea
          id="sourceText"
          placeholder="Type words or phrases..."
          oninput="handleTranslate()"
        ></textarea>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label id="outputLabel" for="targetText">Minionese</label>
          <button class="action-btn" onclick="copyToClipboard()">Copy</button>
        </div>
        <textarea
          id="targetText"
          readonly
          placeholder="Translation..."
        ></textarea>
      </div>

      <div class="dictionary-drawer">
        <button class="drawer-toggle" onclick="toggleDrawer()">
          📖 View Core Dictionary Words
        </button>
        <div id="drawerContent" class="drawer-content">
          <div id="dictGrid" class="dict-grid"></div>
        </div>
      </div>
    </div>

    <script>
      // Massive expanded deterministic mapping array
      const dictionary = [
        // Greetings & Basics
        { en: "hello", min: "bello" },
        { en: "goodbye", min: "poopaye" },
        { en: "thank you", min: "bank yu" },
        { en: "thanks", min: "tanki" },
        { en: "sorry", min: "bi-do" },
        { en: "please", min: "por favor" },
        { en: "welcome", min: "bula" },
        { en: "yes", min: "da" },
        { en: "no", min: "nu" },
        { en: "ok", min: "okay" },
        { en: "okay", min: "okay" },

        // Pronouns & People
        { en: "i", min: "me" },
        { en: "me", min: "me" },
        { en: "you", min: "tu" },
        { en: "we", min: "bee" },
        { en: "us", min: "bee" },
        { en: "they", min: "bu" },
        { en: "them", min: "bu" },
        { en: "he", min: "li" },
        { en: "she", min: "la" },
        { en: "him", min: "li" },
        { en: "her", min: "la" },
        { en: "friend", min: "buddha" },
        { en: "friends", min: "buddhas" },
        { en: "man", min: "tlano" },
        { en: "woman", min: "tlana" },
        { en: "baby", min: "baboi" },

        // Verbs & Actions
        { en: "want", min: "pwede" },
        { en: "like", min: "tulali" },
        { en: "love", min: "ti amo" },
        { en: "hate", min: "tatata" },
        { en: "look", min: "luk" },
        { en: "see", min: "luk" },
        { en: "go", min: "bapple" },
        { en: "come", min: "kama" },
        { en: "stop", min: "stoppa" },
        { en: "run", min: "gogogo" },
        { en: "eat", min: "chompa" },
        { en: "drink", min: "gula" },
        { en: "kiss", min: "muak" },
        { en: "dance", min: "choka" },
        { en: "sing", min: "lala" },
        { en: "play", min: "ludo" },
        { en: "help", min: "sos" },
        { en: "know", min: "wata" },
        { en: "understand", min: "wata" },

        // Food & Items
        { en: "banana", min: "banana" },
        { en: "bananas", min: "bananas" },
        { en: "apple", min: "bapple" },
        { en: "apples", min: "bapples" },
        { en: "ice cream", min: "gelato" },
        { en: "toy", min: "baboi" },
        { en: "chair", min: "silya" },
        { en: "butt", min: "butt" },
        { en: "fire", min: "bee do bee do" },
        { en: "water", min: "aqua" },
        { en: "milk", min: "malka" },
        { en: "coffee", min: "kaba" },

        // Common Phrases
        { en: "i love you", min: "tulaliloo ti amo" },
        { en: "i hate you", min: "tatata bala tu" },
        { en: "look at you", min: "luk at tu" },
        { en: "how are you", min: "muakasa" },
        { en: "what is that", min: "po ka ta" },
        { en: "cheers", min: "kampai" },
        { en: "wedding", min: "la boda" },
        { en: "marriage", min: "la boda" },
        { en: "i'm hungry", min: "me chompa chompa" },

        // Connectors & Questions
        { en: "and", min: "na" },
        { en: "maybe", min: "ba" },
        { en: "or", min: "ka" },
        { en: "with", min: "con" },
        { en: "for", min: "para" },
        { en: "to", min: "para" },
        { en: "what", min: "po ka" },
        { en: "who", min: "sa" },
        { en: "where", min: "poka" },
        { en: "why", min: "mazo" },
        { en: "here", min: "hika" },
        { en: "there", min: "taka" },
        { en: "on", min: "ba" },

        // Adjectives / Description
        { en: "ugly", min: "bananonina" },
        { en: "beautiful", min: "bellisima" },
        { en: "good", min: "bula" },
        { en: "bad", min: "loka" },
        { en: "crazy", min: "loko" },
        { en: "happy", min: "tula" },
        { en: "sad", min: "bidu" },
        { en: "big", min: "bango" },
        { en: "small", min: "pika" },

        // Numbers
        { en: "one", min: "hana" },
        { en: "two", min: "dul" },
        { en: "three", min: "sae" },
        { en: "four", min: "para" },
        { en: "five", min: "panka" },
        { en: "six", min: "saxta" },
        { en: "seven", min: "septa" },
        { en: "eight", min: "okto" },
        { en: "nine", min: "nona" },
        { en: "ten", min: "deka" },
      ];

      // Sorting maps dynamically by structural word count/length descending
      const englishToMinionMap = [...dictionary].sort(
        (a, b) => b.en.length - a.en.length,
      );
      const minionToEnglishMap = [...dictionary].sort(
        (a, b) => b.min.length - a.min.length,
      );

      // Phonetic mapping matrices for translation fallbacks
      const vowelMap = { a: "a", e: "o", i: "ee", o: "u", u: "oo", y: "ee" };
      const consonantMap = {
        f: "b",
        v: "b",
        th: "d",
        t: "t",
        s: "sh",
        c: "k",
        q: "k",
        r: "",
      };

      function genericAlgorithmicTranslate(word, mode) {
        if (!word) return "";
        let lower = word.toLowerCase();
        let result = "";

        if (mode === "toMinion") {
          let i = 0;
          while (i < lower.length) {
            if (lower.substring(i, i + 2) === "th") {
              result += "d";
              i += 2;
            } else if (consonantMap[lower[i]] !== undefined) {
              result += consonantMap[lower[i]];
              i++;
            } else if (vowelMap[lower[i]] !== undefined) {
              result += vowelMap[lower[i]];
              i++;
            } else {
              result += lower[i];
              i++;
            }
          }
          if (
            result.length > 3 &&
            !result.endsWith("o") &&
            !result.endsWith("a") &&
            !result.endsWith("i")
          ) {
            result += result.length % 2 === 0 ? "a" : "o";
          }
        } else {
          let i = 0;
          while (i < lower.length) {
            if (lower.substring(i, i + 2) === "ee") {
              result += "i";
              i += 2;
            } else if (lower[i] === "b") {
              result += "f";
              i++;
            } else if (lower[i] === "d") {
              result += "th";
              i++;
            } else if (lower[i] === "u") {
              result += "o";
              i++;
            } else {
              result += lower[i];
              i++;
            }
          }
          if (
            (result.endsWith("a") || result.endsWith("o")) &&
            result.length > 4
          ) {
            result = result.slice(0, -1);
          }
        }
        return matchCase(word, result);
      }

      function matchCase(source, target) {
        if (source === source.toUpperCase()) return target.toUpperCase();
        if (source[0] === source[0].toUpperCase())
          return target.charAt(0).toUpperCase() + target.slice(1);
        return target.toLowerCase();
      }

      let currentDirection = "toMinion";

      function setDirection(direction) {
        currentDirection = direction;
        document
          .getElementById("toMinionBtn")
          .classList.toggle("active", direction === "toMinion");
        document
          .getElementById("toEnglishBtn")
          .classList.toggle("active", direction === "toEnglish");

        document.getElementById("inputLabel").innerText =
          direction === "toMinion" ? "English" : "Minionese";
        document.getElementById("outputLabel").innerText =
          direction === "toMinion" ? "Minionese" : "English";

        const source = document.getElementById("sourceText");
        const target = document.getElementById("targetText");
        source.value = target.value;
        handleTranslate();
      }

      function handleTranslate() {
        const text = document.getElementById("sourceText").value;
        if (!text.trim()) {
          document.getElementById("targetText").value = "";
          return;
        }

        const tokens = text.match(/\w+(?:'\w+)?|[^\w\s]|\s+/g) || [];
        let translatedTokens = [];
        let i = 0;

        const mapToUse =
          currentDirection === "toMinion"
            ? englishToMinionMap
            : minionToEnglishMap;
        const keySrc = currentDirection === "toMinion" ? "en" : "min";
        const keyTar = currentDirection === "toMinion" ? "min" : "en";

        while (i < tokens.length) {
          let matched = false;

          for (let length = 6; length >= 1; length--) {
            if (i + length <= tokens.length) {
              let phraseSlice = tokens.slice(i, i + length);
              let rawPhrase = phraseSlice.join("").trim().toLowerCase();
              let cleanPhrase = rawPhrase
                .replace(/[^\w\s]/g, "")
                .replace(/\s+/g, " ");

              let match = mapToUse.find((item) => item[keySrc] === cleanPhrase);
              if (match) {
                let translation = match[keyTar];
                translation = matchCase(phraseSlice[0], translation);
                translatedTokens.push(translation);

                let lastToken = phraseSlice[phraseSlice.length - 1];
                if (/[^\w\s]/.test(lastToken)) {
                  translatedTokens.push(lastToken);
                }

                i += length;
                matched = true;
                break;
              }
            }
          }

          if (!matched) {
            let currentToken = tokens[i];
            if (/\w+/.test(currentToken)) {
              translatedTokens.push(
                genericAlgorithmicTranslate(currentToken, currentDirection),
              );
            } else {
              translatedTokens.push(currentToken);
            }
            i++;
          }
        }

        document.getElementById("targetText").value = translatedTokens.join("");
      }

      function clearInput() {
        document.getElementById("sourceText").value = "";
        document.getElementById("targetText").value = "";
      }

      function copyToClipboard() {
        const targetText = document.getElementById("targetText");
        if (!targetText.value) return;
        navigator.clipboard.writeText(targetText.value);
      }

      function toggleDrawer() {
        document.getElementById("drawerContent").classList.toggle("open");
      }

      // Populate Dictionary Preview dynamically
      const grid = document.getElementById("dictGrid");
      [...dictionary]
        .sort((a, b) => a.en.localeCompare(b.en))
        .forEach((item) => {
          const div = document.createElement("div");
          div.className = "dict-item";
          div.innerHTML = `<span>${item.en}</span><span>${item.min}</span>`;
          grid.appendChild(div);
        });
    </script>
  </body>
</html>
