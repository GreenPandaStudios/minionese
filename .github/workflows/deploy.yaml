name: Deploy Minion Translator to Pages

on:
  push:
    branches:
      - main # Change this to "master" if your repository default branch uses the legacy name

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Config
        uses: actions/configure-pages@v4

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire root directory containing index.html
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
